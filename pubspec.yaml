name: pasabaybcd
description: PasabayBCD - SME Logistics Hub for Bacolod City

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  location: ^6.0.2
  shared_preferences: ^2.2.3
  http: ^1.2.1
  image_picker: ^1.0.7
  flutter_svg: ^2.0.9
  image: ^4.1.3

  sqflite: ^2.3.0
  path: ^1.8.3


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/images/
